<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Samuel Yazie">
        <meta name="description" content="Samuel Yazie web developer">
        <meta name="keywords" content="web developer, web, developer, 
          front-end, html, css, javascript, react, sqi">
        <title>Digital clock</title>
        <link rel="stylesheet" href="./assets/style/index.css" media="all">
        <script type="module" src="./assets/script/index.js"></script>
    </head>
    <body>
      <div class="container">
        <div class="clock">
          <div class="time hour">
            <p id="hours"></p>
            <h2>hours</h2>
          </div>
          <div class="time minute">
            <p id="minutes"></p>         
            <h2>minutes</h2>
          </div>
          <div class="time second">
            <p id="seconds"></p>
            <h2>seconds</h2>
          </div>
          <div class="ampm">
            <p id="ampm"></p>
          </div>
        </div>
        <div class="date">
          <div class="day-week">
            <p id="weekDay"></p>
          </div>
          <div class="current-month">
            <p id="month"></p>
          </div>
            <div class="date-of-month">
            <p id="month-date"></p>
          </div>
          <div class="the-year">
            <p id="full-year"></p>
          </div>
          </div>
        </div>
      </div>
    </body>
</html>
